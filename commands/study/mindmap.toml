description = "Create a hierarchical mind map to visualize the structure and relationships of concepts."

prompt = """
Generate a comprehensive hierarchical mind map based on this content to show how the concepts are structured and connected.

Instructions:
- Work ONLY with provided content—NEVER add external information.
- Identify the central overarching theme, the main topics (branches), sub-topics, and key supporting details (leaves).
- Output ONLY a Mermaid.js code block (` ```mermaid `). Do not output any other text.
- Never include introductory or concluding remarks.

CRITICAL MERMAID SYNTAX RULES (To prevent rendering errors):
1. First line must be exactly `mindmap` with no other text.
2. Hierarchy is defined STRICTLY by indentation (spaces). NEVER use markdown bullets (`-`, `*`, or `+`).
3. Use normal English words WITH SPACES for readability (e.g., `Introduction to Psychology`, NOT `IntroductionToPsychology`).
4. Do NOT use shape wrappers or Node IDs. Just write the plain text directly at the correct indentation level (e.g., use `Ancient Beliefs`, NOT `A[Ancient Beliefs]` or `root(Ancient Beliefs)`).
5. Keep node labels purely alphanumeric with spaces. DO NOT use parentheses `()`, brackets `[]`, braces `{}`, quotes `"`, or colons `:` anywhere. These crash the parser.
6. Keep labels concise (1-6 words).

```mermaid
mindmap
  Central Theme
    Main Topic One
      Sub Topic A
      Sub Topic B
    Main Topic Two
      Sub Topic C
```

{{args}}
"""
