description = "Transcribe PDF lecture slides into a Markdown document while preserving the exact original text."

prompt = """
Convert this PDF lecture file into a structured Markdown document.

CRITICAL: You MUST use your shell/bash execution tool to run the CLI app: `pdfocr <file> --all-pages` (or pass `--pages:"..."` if specified).
NEVER use `read_file` or native file reading tools on PDFs. Parse the JSONL stdout.

Instructions:
- Work ONLY with provided content—NEVER add external information or examples.
- CRITICAL: Output the educational text VERBATIM. Do NOT summarize, paraphrase, simplify, or shorten the sentences.
- Maintain the original bullet points exactly as they appear in the text.
- Use proper markdown formatting with headers and structure as it appears in the slides.
- Use LaTeX math with `$...$` for inline and `$$...$$` for display equations.
- Never include introductory or concluding remarks (no "Here is the transcription...", etc.).
- Remove metadata ONLY (instructor info, headers, footers, page numbers, timestamps, course codes).
- Preserve all educational content (concepts, definitions, examples) word-for-word.
- If some content is extremely fragmented or unclear, skip those sections without attempting to interpret or rewrite them.

{{args}}
"""
